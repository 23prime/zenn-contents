name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync upstream
        uses: 23prime/sync-upstream@1fdf8a75b9189d86dde92837b25ba0d72e4a4b55 # v1.1.0
        with:
          upstream-url: https://github.com/23prime/mise-template.git
          github-token: ${{ secrets.GITHUB_TOKEN }}
