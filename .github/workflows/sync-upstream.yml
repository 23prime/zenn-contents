name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push synced commits
      pull-requests: write # create the sync PR

    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@2b76335ff1c2dd298e983961f7a200d3fe9076c2 # v0.0.36

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync upstream
        uses: 23prime/sync-upstream@01b700f2e968c11b4631d6f50a28dd0750deca10 # v1.1.1
        with:
          upstream-url: https://github.com/23prime/mise-template.git
          github-token: ${{ secrets.GITHUB_TOKEN }}
