name: Check Markdown

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown.yml"
      - ".markdownlint-cli2.jsonc"
      - "mise.lock"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/check-markdown.yml"
      - ".markdownlint-cli2.jsonc"
      - "mise.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push auto-fix commits
    steps:
      - name: cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@2b76335ff1c2dd298e983961f7a200d3fe9076c2 # v0.0.36

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install mise and setup
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          install_args: "markdownlint-cli2"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          MISE_LOCKED: "1"

      - name: Fix
        run: mise run md-fix

      - name: Commit and Push
        uses: 23prime/simple-commit-and-push@15fb653b9591afde3bffb82a906a9af2aede1616 # v1.0.0
        with:
          commit-message: "Auto fix by workflow"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check
        run: mise run md-check
