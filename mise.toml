# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
minimum_release_age = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Node.js
node = "25"

# Markdown
markdownlint-cli2 = "0.22"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
zizmor = "1"

# Other tools
lefthook = "2"
cspell = "10"
gitleaks = "8"

# Zenn CLI
pnpm = "10"


# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check", "gitleaks-check"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=medium",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Secrets
[tasks.gitleaks-check]
description = "Check for leaked secrets"
run = "gitleaks git --redact --no-banner"
alias = "glc"

[tasks.gitleaks-protect]
description = "Check staged files for leaked secrets"
run = "gitleaks git --pre-commit --redact --no-banner"
alias = "glp"

# Zenn CLI
[tasks.zenn-setup]
description = "Initialize Zenn CLI"
run = ["pnpm install --frozen-lockfile"]
alias = "zi"


[tasks.zenn-preview]
description = "Preview Zenn contents"
run = "pnpm zenn preview"
alias = "zp"
