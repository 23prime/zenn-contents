# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
minimum_release_age = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Node.js
node = "26"

# Markdown
markdownlint-cli2 = "0.23.0"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
zizmor = "1.26.1"

# Git
lefthook = "2"
betterleaks = "v1.6.1"

# Spell Check
cspell = "10"

# Zenn CLI
pnpm = "11"


# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
env = { GITHUB_TOKEN = "{{ exec(command='gh auth token') }}" }
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check", "secret-check-all"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=low",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Secrets
[tasks.secret-check]
description = "Check staged files for leaked secrets"
run = "betterleaks git --pre-commit --redact --no-banner"
alias = "scc"

[tasks.secret-check-all]
description = "Check for leaked secrets"
run = "betterleaks git --redact --no-banner"
alias = "sca"

# Zenn CLI
[tasks.zenn-setup]
description = "Initialize Zenn CLI"
run = ["pnpm install --frozen-lockfile"]
alias = "zi"

[tasks.zenn-preview]
description = "Preview Zenn contents"
run = "pnpm zenn preview"
alias = "zp"

# mise lock
[tasks.lock-fix]
description = "Update mise.lock"
run = "mise lock"
alias = "lf"

[tasks.lock-check]
description = "Check mise.lock is up to date"
run = ["mise lock", "git diff --exit-code -- mise.lock"]
alias = "lc"
